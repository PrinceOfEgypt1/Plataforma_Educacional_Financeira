name: Impact Agent (advisory)

# Estágio: ADVISORY — este workflow observa e reporta, nunca bloqueia.
# Referências:
#   - ADR-001-impact-agent.md (critérios de promoção advisory → warning → blocking)
#   - docs/sprints/sprint-01/evidencias/impact-agent-ci.md
#   - CND-03 (LISTA_DE_BLOQUEADORES_E_CONDICIONANTES.md)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # necessário apenas para postar comentário de advisory

concurrency:
  group: impact-agent-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  impact-advisory:
    name: Impact analysis (advisory)
    runs-on: ubuntu-latest
    # Redundância defensiva: o script SEMPRE sai com código 0 em advisory,
    # mas mantemos o flag para blindagem explícita do estágio.
    continue-on-error: true

    steps:
      - name: Checkout (com histórico para diff base..head)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve base SHA do PR
        id: base
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="HEAD~1"
          fi
          echo "sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Base SHA = $BASE_SHA"

      - name: Run Impact Analysis Guard
        id: impact
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set +e
          python scripts/impact_analysis_guard.py --base "${{ steps.base.outputs.sha }}" \
            | tee impact-report.txt
          RC=${PIPESTATUS[0]}
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          # ADVISORY: o script sai 0 por desenho; nunca bloqueamos aqui.
          exit 0

      - name: Upload impact report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: impact-report
          path: impact-report.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Comment advisory on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('impact-report.txt', 'utf8');
            } catch (e) {
              report = '(impact-report.txt não encontrado — verificar step anterior)';
            }
            // Remove códigos ANSI para tornar o comentário legível no GitHub.
            report = report.replace(/\x1B\[[0-9;]*m/g, '');

            const header =
              '### Impact Agent — advisory\n' +
              '> Estágio atual: **ADVISORY** (nunca bloqueia) — veja ADR-001.\n' +
              `> Base SHA: \`${{ steps.base.outputs.sha }}\` · Run: ` +
              `[#${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n`;

            const body = header + '```text\n' + report + '\n```';

            // Dedup: se já existe um comentário deste agente, atualize; caso contrário, crie.
            const marker = '### Impact Agent — advisory';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = comments.find(c =>
              c.user && c.user.type === 'Bot' && c.body && c.body.startsWith(marker)
            );
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prev.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Impact Agent — advisory" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Estágio: ADVISORY (exit sempre 0)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base SHA: \`${{ steps.base.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit code do script: \`${{ steps.impact.outputs.rc }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          sed -r 's/\x1B\[[0-9;]*m//g' impact-report.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
