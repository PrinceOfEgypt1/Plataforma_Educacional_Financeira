name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"

jobs:
  backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pef_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Instala uv via action oficial (substitui `curl | sh` + PATH frágil).
      # Referência: https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Install backend deps
        run: cd backend && uv pip install -e ".[dev]" --system

      - name: Lint (ruff)
        run: cd backend && python -m ruff check .

      - name: Format check (ruff format)
        run: cd backend && python -m ruff format --check .

      - name: Typecheck (mypy)
        run: cd backend && python -m mypy app/

      - name: Secret scan
        run: pip install "detect-secrets==1.5.0" && detect-secrets scan --baseline .secrets.baseline

      - name: SAST (bandit)
        run: cd backend && python -m bandit -r app/ -c pyproject.toml

      - name: Tests (unit)
        run: cd backend && python -m pytest tests/unit -v --cov=app --cov-report=xml -m unit
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pef_test
          APP_ENV: ci

      - name: Tests (integration)
        run: cd backend && python -m pytest tests/integration -v -m integration
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pef_test
          APP_ENV: ci

  frontend:
    name: Frontend — lint / typecheck / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Instala pnpm via action oficial ANTES de setup-node, para que
      # setup-node consiga resolver o cache do pnpm automaticamente.
      # Referência: https://github.com/pnpm/action-setup
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: cd frontend && pnpm lint

      - name: Format check (prettier)
        run: cd frontend && pnpm format:check

      - name: Typecheck (tsc)
        run: cd frontend && pnpm typecheck

      - name: Tests (vitest)
        run: cd frontend && pnpm test:coverage
