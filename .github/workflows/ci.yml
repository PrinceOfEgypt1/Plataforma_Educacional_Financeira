name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"

jobs:
  backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pef_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Instala uv via action oficial (substitui `curl | sh` + PATH frágil).
      # Referência: https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      # Cria venv local no backend e instala deps de dev dentro dele.
      # Evita a ambiguidade de `--system` + Python do setup-uv tomando o
      # PATH no lugar do Python do setup-python, que causou exit-1 opaco
      # no step `Lint (ruff)` do run 24634398427.
      # `uv pip install --python .venv/bin/python` amarra o install ao
      # exato interpretador do venv recém-criado, eliminando qualquer
      # ambiguidade de descoberta de venv (não depende de VIRTUAL_ENV
      # estar exportado, nem da heurística de auto-discovery do uv).
      - name: Install backend deps
        working-directory: backend
        run: |
          uv venv .venv --python "${{ env.PYTHON_VERSION }}"
          uv pip install --python .venv/bin/python -e ".[dev]"

      # Todos os tooling steps passam a usar `uv run`, que resolve o venv
      # criado acima de forma determinística, sem depender de `$PATH` ou
      # de qual `python` vem primeiro. Idiomático e recomendado pelo
      # próprio astral-sh.
      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: uv run mypy app/

      - name: Secret scan
        run: pip install "detect-secrets==1.5.0" && detect-secrets scan --baseline .secrets.baseline

      - name: SAST (bandit)
        working-directory: backend
        run: uv run bandit -r app/ -c pyproject.toml

      - name: Tests (unit)
        working-directory: backend
        run: uv run pytest tests/unit -v --cov=app --cov-report=xml -m unit
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pef_test
          APP_ENV: ci

      - name: Tests (integration)
        working-directory: backend
        run: uv run pytest tests/integration -v -m integration
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pef_test
          APP_ENV: ci

  frontend:
    name: Frontend — lint / typecheck / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Instala pnpm via action oficial ANTES de setup-node, para que
      # setup-node consiga resolver o cache do pnpm automaticamente.
      # Referência: https://github.com/pnpm/action-setup
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache manual do store do pnpm — substitui o `cache: pnpm` nativo
      # do setup-node, que falhou no run 24634398427 com
      # "Some specified paths were not resolved, unable to cache
      # dependencies." (setup-node chama `pnpm store path` antes de haver
      # store populado, glob retorna vazio). Essa é a receita canônica
      # recomendada pela própria doc do pnpm para GitHub Actions.
      - name: Resolve pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: cd frontend && pnpm lint

      - name: Format check (prettier)
        run: cd frontend && pnpm format:check

      - name: Typecheck (tsc)
        run: cd frontend && pnpm typecheck

      - name: Tests (vitest)
        run: cd frontend && pnpm test:coverage
