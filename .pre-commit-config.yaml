repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - "pydantic>=2.7.0"
          - "pydantic-settings>=2.2.0"

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # Exclui arquivos que, por natureza, são compostos apenas de
        # hashes de integridade determinísticos (base64 SHA-512 de tarballs
        # resolvidos). Nenhum segredo humano pode acabar acidentalmente
        # em um lockfile pnpm — é gerado a partir de `package.json` por
        # `pnpm install`, não editado à mão. O heurístico `is_lock_file`
        # da própria detect-secrets v1.5.0 reconhece `package-lock.json`,
        # `yarn.lock`, `poetry.lock`, `Cargo.lock` etc., mas NÃO
        # `pnpm-lock.yaml` (gap conhecido). Aplicamos aqui a exclusão
        # nominal e auditável, restrita ao único arquivo que dispara o
        # falso positivo em escala.
        exclude: ^frontend/pnpm-lock\.yaml$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", "backend/pyproject.toml"]
        files: ^backend/app/
